// MINIMAP
// ═══════════════════════════════════════════════════════════════

let minimapTimer = null;
const minimapCanvas = $('#minimap-canvas');
const minimapCtx = minimapCanvas.getContext('2d');

function scheduleMinimap() {
  if (minimapTimer) clearTimeout(minimapTimer);
  minimapTimer = setTimeout(renderMinimap, 100);
}

function renderMinimap() {
  const nodes = Object.values(store.nodes);
  const conns = Object.values(store.connections);
  const cw = minimapCanvas.width;
  const ch = minimapCanvas.height;
  minimapCtx.clearRect(0, 0, cw, ch);
  minimapCtx.fillStyle = '#1a1a1a';
  minimapCtx.fillRect(0, 0, cw, ch);

  if (!nodes.length) return;

  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const n of nodes) {
    minX = Math.min(minX, n.x);
    minY = Math.min(minY, n.y);
    maxX = Math.max(maxX, n.x + n.width);
    maxY = Math.max(maxY, n.y + n.height);
  }

  const margin = 20;
  const dw = maxX - minX || 1;
  const dh = maxY - minY || 1;
  const scale = Math.min((cw - margin * 2) / dw, (ch - margin * 2) / dh);
  const ox = (cw - dw * scale) / 2 - minX * scale;
  const oy = (ch - dh * scale) / 2 - minY * scale;

  // Draw connections
  minimapCtx.strokeStyle = '#444';
  minimapCtx.lineWidth = 1;
  for (const c of conns) {
    const fn = store.nodes[c.from];
    const tn = store.nodes[c.to];
    if (!fn || !tn) continue;
    const p1 = getPortPos(fn, c.fromPort);
    const p2 = getPortPos(tn, c.toPort);
    minimapCtx.beginPath();
    minimapCtx.moveTo(p1.x * scale + ox, p1.y * scale + oy);
    minimapCtx.lineTo(p2.x * scale + ox, p2.y * scale + oy);
    minimapCtx.stroke();
  }

  // Draw nodes
  for (const n of nodes) {
    minimapCtx.fillStyle = n.color;
    minimapCtx.fillRect(n.x * scale + ox, n.y * scale + oy, n.width * scale, n.height * scale);
  }

  // Draw viewport rect
  const svgRect = svgEl.getBoundingClientRect();
  const vx = (-store.viewport.x / store.viewport.zoom);
  const vy = (-store.viewport.y / store.viewport.zoom);
  const vw = svgRect.width / store.viewport.zoom;
  const vh = svgRect.height / store.viewport.zoom;

  minimapCtx.strokeStyle = '#0078d4';
  minimapCtx.lineWidth = 2;
  minimapCtx.strokeRect(vx * scale + ox, vy * scale + oy, vw * scale, vh * scale);

  // Store minimap transform for click handling
  minimapCanvas._mmScale = scale;
  minimapCanvas._mmOx = ox;
  minimapCanvas._mmOy = oy;
  minimapCanvas._mmMinX = minX;
  minimapCanvas._mmMinY = minY;
}

// Minimap click to pan
$('#minimap').addEventListener('pointerdown', (e) => {
  e.stopPropagation();
  const rect = minimapCanvas.getBoundingClientRect();
  const scaleX = minimapCanvas.width / rect.width;
  const scaleY = minimapCanvas.height / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;
  const scale = minimapCanvas._mmScale || 1;
  const ox = minimapCanvas._mmOx || 0;
  const oy = minimapCanvas._mmOy || 0;
  const canvasX = (mx - ox) / scale;
  const canvasY = (my - oy) / scale;
  const svgRect = svgEl.getBoundingClientRect();
  const newVpX = svgRect.width / 2 - canvasX * store.viewport.zoom;
  const newVpY = svgRect.height / 2 - canvasY * store.viewport.zoom;
  dispatch('SET_VIEWPORT', { x: newVpX, y: newVpY });
});

// LIVE RELOAD — polls logic-flow-data.json for changes from Claude
// ═══════════════════════════════════════════════════════════════

let liveReloadHash = null;
let liveReloadInterval = null;
let liveReloadEnabled = true;

async function checkForDataFile() {
  const statusEl = document.getElementById('status-live');
  try {
    const resp = await fetch('logic-flow-data.json?t=' + Date.now());
    if (!resp.ok) {
      if (statusEl) statusEl.textContent = '';
      return false;
    }
    const text = await resp.text();
    const hash = simpleHash(text);
    if (hash !== liveReloadHash) {
      liveReloadHash = hash;
      try {
        const data = JSON.parse(text);
        if (data && data.nodes) {
          dispatch('IMPORT_STATE', data);
          setTimeout(fitAll, 50);
          if (statusEl) {
            statusEl.textContent = 'Live loaded';
            statusEl.style.color = '#4ec970';
            setTimeout(() => {
              statusEl.textContent = 'Watching...';
              statusEl.style.color = '#888';
            }, 2000);
          }
          return true;
        }
      } catch (e) {
        console.warn('Live reload: invalid JSON', e);
      }
    } else {
      if (statusEl) {
        statusEl.textContent = 'Watching...';
        statusEl.style.color = '#888';
      }
    }
  } catch (e) {
    // File not found or CORS — normal when no data file exists
    if (statusEl) statusEl.textContent = '';
  }
  return false;
}

function simpleHash(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) {
    const ch = str.charCodeAt(i);
    hash = ((hash << 5) - hash) + ch;
    hash |= 0;
  }
  return hash;
}

function startLiveReload() {
  if (liveReloadInterval) clearInterval(liveReloadInterval);
  liveReloadInterval = setInterval(() => {
    if (liveReloadEnabled) checkForDataFile();
  }, 2000);
}

function stopLiveReload() {
  if (liveReloadInterval) {
    clearInterval(liveReloadInterval);
    liveReloadInterval = null;
  }
  const statusEl = document.getElementById('status-live');
  if (statusEl) statusEl.textContent = '';
}

// ═══════════════════════════════════════════════════════════════
// IMPROVED HIT TESTING — Diamond & Parallelogram shapes
// ═══════════════════════════════════════════════════════════════

function pointInDiamond(px, py, node) {
  const cx = node.x + node.width / 2;
  const cy = node.y + node.height / 2;
  const hw = node.width / 2;
  const hh = node.height / 2;
  // Diamond: |px-cx|/hw + |py-cy|/hh <= 1
  return (Math.abs(px - cx) / hw + Math.abs(py - cy) / hh) <= 1.05;
}

function pointInParallelogram(px, py, node) {
  const { x, y, width: w, height: h } = node;
  const skew = w * 0.15;
  // Top edge from (x+skew, y) to (x+w, y)
  // Bottom edge from (x, y+h) to (x+w-skew, y+h)
  // Approximate with bounding box + slope check
  if (py < y || py > y + h || px < x || px > x + w) return false;
  const t = (py - y) / h; // 0 at top, 1 at bottom
  const leftEdge = x + skew * (1 - t);
  const rightEdge = x + w - skew * t;
  return px >= leftEdge && px <= rightEdge;
}

// Override the basic hitTestNode for shape-aware testing
const _origHitTestNode = hitTestNode;
hitTestNode = function(cx, cy) {
  const nodes = Object.values(store.nodes);
  for (let i = nodes.length - 1; i >= 0; i--) {
    const n = nodes[i];
    // Quick bounding box reject
    if (cx < n.x - 5 || cx > n.x + n.width + 5 || cy < n.y - 5 || cy > n.y + n.height + 5) continue;
    switch (n.type) {
      case 'decision':
        if (pointInDiamond(cx, cy, n)) return n;
        break;
      case 'io':
        if (pointInParallelogram(cx, cy, n)) return n;
        break;
      default:
        if (cx >= n.x && cx <= n.x + n.width && cy >= n.y && cy <= n.y + n.height) return n;
    }
  }
  return null;
};

// ═══════════════════════════════════════════════════════════════
// SMOOTH CONNECTION PATHS — Rounded corners
// ═══════════════════════════════════════════════════════════════

function pointsToSmoothPath(points) {
  if (points.length < 2) return '';
  if (points.length === 2) {
    return `M ${points[0].x} ${points[0].y} L ${points[1].x} ${points[1].y}`;
  }

  const radius = 12;
  let d = `M ${points[0].x} ${points[0].y}`;

  for (let i = 1; i < points.length - 1; i++) {
    const prev = points[i - 1];
    const curr = points[i];
    const next = points[i + 1];

    // Vector from curr to prev and curr to next
    const dx1 = prev.x - curr.x, dy1 = prev.y - curr.y;
    const dx2 = next.x - curr.x, dy2 = next.y - curr.y;
    const len1 = Math.sqrt(dx1 * dx1 + dy1 * dy1);
    const len2 = Math.sqrt(dx2 * dx2 + dy2 * dy2);

    if (len1 === 0 || len2 === 0) {
      d += ` L ${curr.x} ${curr.y}`;
      continue;
    }

    const r = Math.min(radius, len1 / 2, len2 / 2);
    const startX = curr.x + (dx1 / len1) * r;
    const startY = curr.y + (dy1 / len1) * r;
    const endX = curr.x + (dx2 / len2) * r;
    const endY = curr.y + (dy2 / len2) * r;

    d += ` L ${startX} ${startY}`;
    d += ` Q ${curr.x} ${curr.y} ${endX} ${endY}`;
  }

  d += ` L ${points[points.length - 1].x} ${points[points.length - 1].y}`;
  return d;
}

// Patch renderConnections to use smooth paths
const _origRenderConnections = renderConnections;
renderConnections = function() {
  layerConnections.innerHTML = '';
  const selected = new Set(store.selectedIds);

  for (const conn of Object.values(store.connections)) {
    const fromNode = store.nodes[conn.from];
    const toNode = store.nodes[conn.to];
    if (!fromNode || !toNode) continue;

    const points = routeConnection(fromNode, conn.fromPort, toNode, conn.toPort);
    const d = pointsToSmoothPath(points);
    const isSel = selected.has(conn.id);
    const color = isSel ? '#0078d4' : (conn.color || '#569cd6');

    const g = createSVGElement('g', { 'data-conn-id': conn.id });

    // Hit area
    const hit = createSVGElement('path', {
      d, class: 'connection-hit', 'data-conn-id': conn.id,
    });
    g.appendChild(hit);

    // Dynamic arrowhead marker
    const markerId = isSel ? 'arrowhead-selected' : ('arrow-' + conn.id);
    if (!isSel) {
      const marker = createSVGElement('marker', {
        id: markerId, markerWidth: 10, markerHeight: 7,
        refX: 9, refY: 3.5, orient: 'auto', markerUnits: 'strokeWidth'
      });
      const poly = createSVGElement('polygon', {
        points: '0 0, 10 3.5, 0 7', fill: color
      });
      marker.appendChild(poly);
      g.appendChild(marker);
    }

    // Visible line
    const line = createSVGElement('path', {
      d, class: 'connection-line',
      stroke: color,
      'stroke-dasharray': conn.lineStyle === 'dashed' ? '8 4' : 'none',
      'marker-end': `url(#${markerId})`,
      'data-conn-id': conn.id,
    });
    if (isSel) line.setAttribute('stroke-width', '3');
    g.appendChild(line);

    // Label
    if (conn.label) {
      const midIdx = Math.floor(points.length / 2);
      const midPrev = points[midIdx - 1] || points[0];
      const midCurr = points[midIdx] || points[points.length - 1];
      const mid = {
        x: (midPrev.x + midCurr.x) / 2,
        y: (midPrev.y + midCurr.y) / 2
      };
      const tw = measureTextWidth(conn.label, 12) + 10;
      const bg = createSVGElement('rect', {
        x: mid.x - tw / 2, y: mid.y - 10,
        width: tw, height: 20, rx: 4,
        fill: '#1e1e1e', 'fill-opacity': 0.9,
        'pointer-events': 'none'
      });
      g.appendChild(bg);
      const label = createSVGElement('text', {
        x: mid.x, y: mid.y + 4,
        'text-anchor': 'middle',
        class: 'connection-label',
        fill: color,
      });
      label.textContent = conn.label;
      g.appendChild(label);
    }

    layerConnections.appendChild(g);
  }
};

// DRAG MINIMAP — continuous pan while dragging on minimap
// ═══════════════════════════════════════════════════════════════

(function() {
  const mm = $('#minimap');
  let mmDragging = false;

  function mmPanTo(e) {
    const rect = minimapCanvas.getBoundingClientRect();
    const scaleX = minimapCanvas.width / rect.width;
    const scaleY = minimapCanvas.height / rect.height;
    const mx = (e.clientX - rect.left) * scaleX;
    const my = (e.clientY - rect.top) * scaleY;
    const scale = minimapCanvas._mmScale || 1;
    const ox = minimapCanvas._mmOx || 0;
    const oy = minimapCanvas._mmOy || 0;
    const canvasX = (mx - ox) / scale;
    const canvasY = (my - oy) / scale;
    const svgRect = svgEl.getBoundingClientRect();
    const newVpX = svgRect.width / 2 - canvasX * store.viewport.zoom;
    const newVpY = svgRect.height / 2 - canvasY * store.viewport.zoom;
    dispatch('SET_VIEWPORT', { x: newVpX, y: newVpY });
  }

  mm.addEventListener('pointerdown', (e) => {
    e.stopPropagation();
    mmDragging = true;
    mm.setPointerCapture(e.pointerId);
    mmPanTo(e);
  });
  mm.addEventListener('pointermove', (e) => {
    if (mmDragging) { e.stopPropagation(); mmPanTo(e); }
  });
  mm.addEventListener('pointerup', (e) => {
    if (mmDragging) {
      mmDragging = false;
      mm.releasePointerCapture(e.pointerId);
      e.stopPropagation();
    }
  });
})();

        <span style="color:#888">Space+Drag</span><span>Pan canvas</span>
        <span style="color:#888">Mouse Wheel</span><span>Zoom</span>
        <span style="color:#888">Middle Click</span><span>Pan canvas</span>
        <span style="color:#888">Double Click</span><span>Edit node text</span>
        <span style="color:#888">Arrow Keys</span><span>Nudge selection</span>
        <span style="color:#888">Escape</span><span>Deselect / cancel</span>
        <span style="color:#888">?</span><span>This help</span>
      </div>
      <p style="margin-top:16px;font-size:11px;color:#666;text-align:center;">Press Escape or click to close</p>
    </div>
  `;
  document.body.appendChild(helpOverlay);

  helpOverlay.addEventListener('click', () => { helpOverlay.style.display = 'none'; });

  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (e.key === '?' || (e.key === '/' && e.shiftKey)) {
      e.preventDefault();
      helpOverlay.style.display = helpOverlay.style.display === 'flex' ? 'none' : 'flex';
    }
    if (e.key === 'Escape' && helpOverlay.style.display === 'flex') {
      helpOverlay.style.display = 'none';
      e.stopPropagation();
    }
  });
})();

// ═══════════════════════════════════════════════════════════════
// TOUCH / TRACKPAD PINCH-TO-ZOOM SUPPORT
// ═══════════════════════════════════════════════════════════════

container.addEventListener('gesturestart', (e) => e.preventDefault());
container.addEventListener('gesturechange', (e) => e.preventDefault());

// ═══════════════════════════════════════════════════════════════
// PREVENT ACCIDENTAL NAVIGATION
// ═══════════════════════════════════════════════════════════════

window.addEventListener('beforeunload', (e) => {
  if (Object.keys(store.nodes).length > 0) {
    e.preventDefault();
    e.returnValue = '';
  }
});

// ═══════════════════════════════════════════════════════════════
// NODE COUNT BADGE ON STATUS BAR UPDATES
// ═══════════════════════════════════════════════════════════════

// Title update with node count
const _origUpdateStatusBar = updateStatusBar;
updateStatusBar = function() {
  _origUpdateStatusBar();
  const nc = Object.keys(store.nodes).length;
  document.title = nc > 0 ? `Logic Flow Editor (${nc} nodes)` : 'Logic Flow Editor';
};

// ═══════════════════════════════════════════════════════════════
// SNAP INDICATOR LINES (show alignment guides)
// ═══════════════════════════════════════════════════════════════

function getSnapGuides(movingIds, testX, testY, testW, testH) {
  const guides = [];
  const threshold = 5;
  const movingSet = new Set(movingIds);

  const mCx = testX + testW / 2;
  const mCy = testY + testH / 2;
  const mRight = testX + testW;
  const mBottom = testY + testH;

  for (const n of Object.values(store.nodes)) {
    if (movingSet.has(n.id)) continue;
    const nCx = n.x + n.width / 2;
    const nCy = n.y + n.height / 2;
    const nRight = n.x + n.width;
    const nBottom = n.y + n.height;

    // Vertical alignment guides
    if (Math.abs(testX - n.x) < threshold) guides.push({ type: 'v', x: n.x });
    if (Math.abs(mCx - nCx) < threshold) guides.push({ type: 'v', x: nCx });
    if (Math.abs(mRight - nRight) < threshold) guides.push({ type: 'v', x: nRight });
    if (Math.abs(testX - nRight) < threshold) guides.push({ type: 'v', x: nRight });
    if (Math.abs(mRight - n.x) < threshold) guides.push({ type: 'v', x: n.x });

    // Horizontal alignment guides
    if (Math.abs(testY - n.y) < threshold) guides.push({ type: 'h', y: n.y });
    if (Math.abs(mCy - nCy) < threshold) guides.push({ type: 'h', y: nCy });
    if (Math.abs(mBottom - nBottom) < threshold) guides.push({ type: 'h', y: nBottom });
    if (Math.abs(testY - nBottom) < threshold) guides.push({ type: 'h', y: nBottom });
    if (Math.abs(mBottom - n.y) < threshold) guides.push({ type: 'h', y: n.y });
  }
  return guides;
}

// ═══════════════════════════════════════════════════════════════
// IMPROVED PORT RENDERING — glowing effect on hover
// ═══════════════════════════════════════════════════════════════

(function() {
  const style3 = document.createElement('style');
  style3.textContent = `
    .node-port {
      transition: opacity 0.15s, r 0.15s, filter 0.15s;
    }
    .node-port:hover {
      r: 8;
      filter: drop-shadow(0 0 4px #0078d4);
      opacity: 1 !important;
    }
    .node-group.selected .node-shape {
      stroke: #0078d4 !important;
      stroke-opacity: 0.6;
    }
  `;
  document.head.appendChild(style3);
})();

// ═══════════════════════════════════════════════════════════════
// WINDOW RESIZE HANDLER — debounced
// ═══════════════════════════════════════════════════════════════

let resizeTimer = null;
window.addEventListener('resize', () => {
  if (resizeTimer) clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => render(), 50);
});

</script>
